name: CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:

  docker-build-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # FRONTEND

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./front_despacho

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      # VENTAS API

      - name: Build Ventas API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push Ventas API
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest

      # DESPACHO API

      - name: Build Despacho API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/despacho-api:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push Despacho API
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/despacho-api:latest