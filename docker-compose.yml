services:

  frontend:
    build:
      context: ./front_despacho
    container_name: frontend-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - ventas-api
      - despacho-api
    networks:
      - app-network

  ventas-api:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: ventas-api
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/ventasdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - mysql-db
    networks:
      - app-network

  despacho-api:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: despacho-api
    restart: always
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/despachosdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - mysql-db
    networks:
      - app-network

  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: ventasdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network: